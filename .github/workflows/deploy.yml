name: CI/CD Build và Push Docker Image  # Tên quy trình

on:
  push:
    branches: [ "main" ]  # Tự động chạy mỗi khi bạn Push code lên nhánh main

jobs:
  trien_khai_docker:
    runs-on: ubuntu-latest  # Sử dụng máy ảo Ubuntu của GitHub

    steps:
      - name: Bước 1 - Tải mã nguồn từ GitHub về máy ảo
        uses: actions/checkout@v4

      - name: Bước 2 - Cài đặt Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Bước 3 - Đóng gói dự án (Tạo file .jar)
        run: mvn clean package -DskipTests

      - name: Bước 4 - Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 5 - Build và Push Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Đặt tên Image theo định dạng: user_docker/ten_repo:tag
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cle:latest
            ${{ secrets.DOCKER_USERNAME }}/cle:${{ github.run_number }}
