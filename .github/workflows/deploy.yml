name: Triển khai lên DevOps Classroom
        run: |
          REPO="nguyenthuha0786/sangthu5_bai7"
          # Lưu ý: Nếu code Java của bạn chạy cổng 8080 thì sửa số 80 thành 8080 nhé
          CONTAINER_PORT=80
          
          # Đã cập nhật slot=5 theo yêu cầu của bạn
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=5&container_port=$CONTAINER_PORT")
          
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON (Lỗi)"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          
          echo "Deploy thành công lên Slot S5!"
          echo "::group::Chi tiết phản hồi từ Server"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"