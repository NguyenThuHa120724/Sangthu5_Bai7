name: Bai_7_CI_CD_Build_Push_Docker

on:
  push:
    branches: [ "main" ]

jobs:
  quy_trinh_tu_dong:
    runs-on: ubuntu-latest

    steps:
      - name: Bước 1 - Lấy code từ GitHub về
        uses: actions/checkout@v4

      - name: Bước 2 - Cài đặt Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Bước 3 - Đóng gói dự án (Maven Build)
        run: |
          mvn clean package -DskipTests
          # Lệnh dưới đây giúp đổi tên file .jar bất kỳ thành app.jar để Docker dễ tìm
          mv target/*.jar target/app.jar

      - name: Bước 4 - Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 5 - Build Image và đẩy lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Luôn đẩy lên với 2 tag: bản mới nhất (latest) và số phiên bản chạy
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cle:latest
            ${{ secrets.DOCKER_USERNAME }}/cle:${{ github.run_number }}